name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Read-only source audit
        run: npm run verify:readonly

      - name: Schema validation
        run: npm run validate:schemas

      - name: Production build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e

  docker-image:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Mission Control image (fixture-friendly, no ADOS mount required)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ados-mission-control:ci
          build-args: |
            APP_VERSION=2.0.0
            BUILD_ID=${{ github.sha }}

      - name: Smoke /api/health without real ADOS roots
        run: |
          docker run -d --name mc-ci-smoke \
            -p 127.0.0.1:3200:3000 \
            -e MISSION_CONTROL_MODE=auto \
            -e MISSION_CONTROL_AUTH_MODE=disabled \
            -e MISSION_CONTROL_PERSISTENCE=disabled \
            -e ADOS_CONTROL_PLANE_ROOT=/tmp/missing-ados \
            ados-mission-control:ci
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:3200/api/health" >/tmp/mc-health.json; then
              cat /tmp/mc-health.json
              docker rm -f mc-ci-smoke
              exit 0
            fi
            sleep 2
          done
          docker logs mc-ci-smoke || true
          docker rm -f mc-ci-smoke || true
          echo "Health smoke failed" >&2
          exit 1
